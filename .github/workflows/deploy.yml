name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Lint
      run: npm run lint
      
    - name: Test
      run: npm test

    - name: Build
      run: npm run build
      env:
        # Vite needs these at build time for import.meta.env
        # Using fallback values for CI builds where secrets might not be set
        # Netlify will inject the real values during its own build
        VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}"
        VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}"
