name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Security audit (warn — flip to blocking 2026-07-14 after 30 clean days)
      run: npm audit --omit=dev --audit-level=high || echo "::warning::npm audit found high vulnerabilities — resolve before 2026-07-14 when this step becomes blocking"

    - name: Lint
      run: npm run lint -- --max-warnings 0

    - name: Type check
      run: npx tsc --noEmit

    - name: Schema drift check
      run: |
        npm install -g supabase --legacy-peer-deps 2>/dev/null || true
        npx supabase gen types typescript --project-id debdriyzfcwvgrhzzzre > src/types/database.types.ts
        git diff --exit-code src/types/database.types.ts || (echo "DB schema drift detected — regenerate types and commit." && exit 1)
      env:
        SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

    - name: Test
      run: npm test

    - name: Build
      run: npm run build
