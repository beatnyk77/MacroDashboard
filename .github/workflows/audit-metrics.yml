name: Weekly Metric ID Audit

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: audit-metrics
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Run metric ID audit
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set in repo secrets"
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_ID:-}" ]; then
            echo "::error::SUPABASE_PROJECT_ID is not set in repo secrets"
            exit 1
          fi

          export SUPABASE_URL="${VITE_SUPABASE_URL:-https://${SUPABASE_PROJECT_ID}.supabase.co}"

          SUPABASE_ANON_KEY=$(supabase projects api-keys --project-ref "$SUPABASE_PROJECT_ID" --output json \
            | node -e "const j=JSON.parse(require('fs').readFileSync(0,'utf8')); const ak=j.find(k=>k.name==='anon'); console.log(ak?.api_key || '')")

          if [ -z "$SUPABASE_ANON_KEY" ]; then
            SUPABASE_ANON_KEY="${VITE_SUPABASE_ANON_KEY:-}"
          fi

          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Could not resolve anon key via Supabase CLI or VITE_SUPABASE_ANON_KEY secret"
            exit 1
          fi

          export SUPABASE_ANON_KEY
          node scripts/audit-metrics.mjs
