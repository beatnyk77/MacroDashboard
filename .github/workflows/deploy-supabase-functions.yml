name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Get changed functions
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ingest-fred: ['supabase/functions/ingest-fred/**']
            ingest-macro-events: ['supabase/functions/ingest-macro-events/**']
            ingest-commodity-reserves: ['supabase/functions/ingest-commodity-reserves/**']
            ingest-mospi: ['supabase/functions/ingest-mospi/**']
            ingest-nse-flows: ['supabase/functions/ingest-nse-flows/**']
            ingest-nyfed-markets: ['supabase/functions/ingest-nyfed-markets/**']
            ingest-un-comtrade: ['supabase/functions/ingest-un-comtrade/**']
            ingest-shadow-trade: ['supabase/functions/ingest-shadow-trade/**']
            ingest-trade-gravity: ['supabase/functions/ingest-trade-gravity/**']
            check-data-health: ['supabase/functions/check-data-health/**']
            generate-newsletter: ['supabase/functions/generate-newsletter/**']
            _shared: ['supabase/functions/_shared/**']

      - name: Deploy Changed Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          # Export each filter result as a named env var — avoids invalid
          # dynamic expression syntax (${{ steps.filter.outputs.$var }})
          CHANGED_SHARED: ${{ steps.filter.outputs._shared }}
          CHANGED_INGEST_FRED: ${{ steps.filter.outputs['ingest-fred'] }}
          CHANGED_INGEST_MACRO_EVENTS: ${{ steps.filter.outputs['ingest-macro-events'] }}
          CHANGED_INGEST_COMMODITY_RESERVES: ${{ steps.filter.outputs['ingest-commodity-reserves'] }}
          CHANGED_INGEST_MOSPI: ${{ steps.filter.outputs['ingest-mospi'] }}
          CHANGED_INGEST_NSE_FLOWS: ${{ steps.filter.outputs['ingest-nse-flows'] }}
          CHANGED_INGEST_NYFED_MARKETS: ${{ steps.filter.outputs['ingest-nyfed-markets'] }}
          CHANGED_INGEST_UN_COMTRADE: ${{ steps.filter.outputs['ingest-un-comtrade'] }}
          CHANGED_INGEST_SHADOW_TRADE: ${{ steps.filter.outputs['ingest-shadow-trade'] }}
          CHANGED_INGEST_TRADE_GRAVITY: ${{ steps.filter.outputs['ingest-trade-gravity'] }}
          CHANGED_CHECK_DATA_HEALTH: ${{ steps.filter.outputs['check-data-health'] }}
          CHANGED_GENERATE_NEWSLETTER: ${{ steps.filter.outputs['generate-newsletter'] }}
        run: |
          deploy_func() {
            local func_name="$1"
            echo "Deploying $func_name..."
            supabase functions deploy "$func_name" --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
          }

          # If _shared changed, redeploy all functions
          if [ "$CHANGED_SHARED" = "true" ]; then
            echo "Shared utils changed — deploying all functions..."
            for func_dir in supabase/functions/*/; do
              if [ -f "${func_dir}index.ts" ]; then
                func_name=$(basename "$func_dir")
                deploy_func "$func_name"
              fi
            done
          else
            # Deploy only changed functions using named env vars (not dynamic expressions)
            [ "$CHANGED_INGEST_FRED" = "true" ]                && deploy_func "ingest-fred"
            [ "$CHANGED_INGEST_MACRO_EVENTS" = "true" ]        && deploy_func "ingest-macro-events"
            [ "$CHANGED_INGEST_COMMODITY_RESERVES" = "true" ]  && deploy_func "ingest-commodity-reserves"
            [ "$CHANGED_INGEST_MOSPI" = "true" ]               && deploy_func "ingest-mospi"
            [ "$CHANGED_INGEST_NSE_FLOWS" = "true" ]           && deploy_func "ingest-nse-flows"
            [ "$CHANGED_INGEST_NYFED_MARKETS" = "true" ]       && deploy_func "ingest-nyfed-markets"
            [ "$CHANGED_INGEST_UN_COMTRADE" = "true" ]         && deploy_func "ingest-un-comtrade"
            [ "$CHANGED_INGEST_SHADOW_TRADE" = "true" ]        && deploy_func "ingest-shadow-trade"
            [ "$CHANGED_INGEST_TRADE_GRAVITY" = "true" ]       && deploy_func "ingest-trade-gravity"
            [ "$CHANGED_CHECK_DATA_HEALTH" = "true" ]          && deploy_func "check-data-health"
            [ "$CHANGED_GENERATE_NEWSLETTER" = "true" ]        && deploy_func "generate-newsletter"
            echo "Selective deployment complete."
          fi
