name: Deploy Supabase

# Secrets expected in GitHub repo settings:
#   SUPABASE_ACCESS_TOKEN  — personal access token with project deploy rights
#   SUPABASE_PROJECT_ID    — project ref (e.g. debdriyzfcwvgrhzzzre)
#
# verify_jwt per-function overrides live in supabase/config.toml — do NOT
# pass --no-verify-jwt in CI; config.toml is the single source of truth.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      deploy_all_functions:
        description: 'Force-deploy all 105 functions (ignores change detection)'
        type: boolean
        default: false

# Prevent overlapping Supabase deploys on the same branch.
# cancel-in-progress: false because partial deploys leave the project in an
# inconsistent state — queue instead.
concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── 0. Detect what changed ─────────────────────────────────────────────────
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      migrations_changed: ${{ steps.changes.outputs.migrations_changed }}
      functions: ${{ steps.changes.outputs.functions }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for three-dot PR diff

      - name: Compute changed paths
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          BASE_REF: ${{ github.base_ref }}
          DEPLOY_ALL_INPUT: ${{ inputs.deploy_all_functions }}
        run: |
          set -euo pipefail

          # ── Resolve the set of changed files ──────────────────────────────
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # Three-dot diff: files changed relative to the PR base branch
            CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || echo "")
          elif [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # Force-push or first push — treat as "everything changed"
            CHANGED_FILES="ALL"
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "$SHA")
          fi

          # ── Migrations changed? ────────────────────────────────────────────
          if echo "$CHANGED_FILES" | grep -q '^supabase/migrations/'; then
            echo "migrations_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "migrations_changed=false" >> "$GITHUB_OUTPUT"
          fi

          # ── Function list (only needed for push/dispatch, not PRs) ────────
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo 'functions=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine whether to deploy all functions
          SHOULD_DEPLOY_ALL="false"

          if [ "${DEPLOY_ALL_INPUT:-false}" = "true" ] || \
             [ "$EVENT_NAME" = "workflow_dispatch" ] || \
             [ "$CHANGED_FILES" = "ALL" ]; then
            SHOULD_DEPLOY_ALL="true"
          fi

          # _shared change → every function must be redeployed
          if [ "$SHOULD_DEPLOY_ALL" = "false" ] && \
             echo "$CHANGED_FILES" | grep -q '^supabase/functions/_shared/'; then
            echo "::notice::_shared changed — deploying all 105 functions"
            SHOULD_DEPLOY_ALL="true"
          fi

          if [ "$SHOULD_DEPLOY_ALL" = "true" ]; then
            # All function directories that contain an index.ts (skip _shared,
            # tsconfig.json, deno.json at the functions root)
            FUNCS=$(find supabase/functions -maxdepth 2 -name 'index.ts' \
              | sed 's|supabase/functions/||; s|/index.ts||' \
              | grep -v '^_' \
              | sort \
              | jq -R . | jq -sc .)
          else
            # Only the directories that were actually touched
            FUNCS=$(echo "$CHANGED_FILES" \
              | grep '^supabase/functions/' \
              | grep -v '^supabase/functions/_' \
              | cut -d/ -f3 \
              | grep -v '\.json$' \
              | grep -v '\.ts$' \
              | sort -u \
              | while read -r dir; do
                  [ -n "$dir" ] && [ -f "supabase/functions/$dir/index.ts" ] && echo "$dir"
                done \
              | jq -R . | jq -sc .)
          fi

          echo "functions=$FUNCS" >> "$GITHUB_OUTPUT"
          echo "::notice::Functions queued for deploy: $FUNCS"

  # ─── 1. Migrations (schema-first; PR → dry-run, main → apply) ──────────────
  migrate:
    name: ${{ github.event_name == 'pull_request' && 'Migrations Dry-Run' || 'Apply Migrations' }}
    runs-on: ubuntu-latest
    needs: detect
    if: >-
      needs.detect.outputs.migrations_changed == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && echo "::error::SUPABASE_ACCESS_TOKEN is not set in repo secrets" && exit 1
          [ -z "$SUPABASE_PROJECT_ID"    ] && echo "::error::SUPABASE_PROJECT_ID is not set in repo secrets"    && exit 1
          echo "Secrets verified. Project ref length: ${#SUPABASE_PROJECT_ID}"

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # PR guardrail: surface migration plan as a job summary (no apply)
      - name: Dry-run migrations
        if: github.event_name == 'pull_request'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          {
            echo "## Migration Dry-Run Plan"
            echo "_Generated for PR \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`_"
            echo ""
            echo '```sql'
            supabase db push --dry-run 2>&1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Main: apply migrations before any function deploy
      - name: Apply migrations
        if: github.event_name != 'pull_request'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase db push

  # ─── 2. Deploy functions in parallel (matrix) ───────────────────────────────
  deploy-functions:
    name: fn/${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: [detect, migrate]
    # Run even when migrate was skipped (functions touched but no migrations)
    # always() prevents automatic skip propagation from a skipped migrate job
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      needs.detect.result == 'success' &&
      needs.detect.outputs.functions != '[]' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    strategy:
      fail-fast: false      # one failure should not abort sibling deploys
      max-parallel: 10      # cap runner usage; GitHub queues the rest
      matrix:
        function: ${{ fromJSON(needs.detect.outputs.functions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy ${{ matrix.function }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # verify_jwt overrides are read from supabase/config.toml automatically;
          # do NOT pass --no-verify-jwt here.
          supabase functions deploy "${{ matrix.function }}"
