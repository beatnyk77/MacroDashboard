name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Get changed functions
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ingest-macro-events: ['supabase/functions/ingest-macro-events/**']
            ingest-commodity-reserves: ['supabase/functions/ingest-commodity-reserves/**']
            ingest-mospi: ['supabase/functions/ingest-mospi/**']

            ingest-nyfed-markets: ['supabase/functions/ingest-nyfed-markets/**']
            ingest-un-comtrade: ['supabase/functions/ingest-un-comtrade/**']
            ingest-shadow-trade: ['supabase/functions/ingest-shadow-trade/**']
            ingest-trade-gravity: ['supabase/functions/ingest-trade-gravity/**']
            check-data-health: ['supabase/functions/check-data-health/**']
            generate-weekly-regime-digest: ['supabase/functions/generate-weekly-regime-digest/**']
            generate-monthly-regime-digest: ['supabase/functions/generate-monthly-regime-digest/**']

            compute-cie-macro-scores: ['supabase/functions/compute-cie-macro-scores/**']
            ingest-cie-ipos: ['supabase/functions/ingest-cie-ipos/**']
            ingest-cie-short-selling: ['supabase/functions/ingest-cie-short-selling/**']
            ingest-rbi-money-market: ['supabase/functions/ingest-rbi-money-market/**']
            ingest-global-refining: ['supabase/functions/ingest-global-refining/**']
            ingest-gold-debt-coverage: ['supabase/functions/ingest-gold-debt-coverage/**']
            ingest-rbi-fx-defense: ['supabase/functions/ingest-rbi-fx-defense/**']
            ingest-commodity-terminal: ['supabase/functions/ingest-commodity-terminal/**']
            ingest-cie-deals: ['supabase/functions/ingest-cie-deals/**']
            ingest-cie-promoters: ['supabase/functions/ingest-cie-promoters/**']

            ingest-us-edgar-fundamentals: ['supabase/functions/ingest-us-edgar-fundamentals/**']
            ingest-fuel-security-india: ['supabase/functions/ingest-fuel-security-india/**']
            ingest-country-metrics: ['supabase/functions/ingest-country-metrics/**']

            ingest-us-macro: ['supabase/functions/ingest-us-macro/**']
            ingest-india-macro-snapshot: ['supabase/functions/ingest-india-macro-snapshot/**']

            llm-knowledge: ['supabase/functions/llm-knowledge/**']
            _shared: ['supabase/functions/_shared/**']

      - name: Verify Secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is missing"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::SUPABASE_PROJECT_ID is missing"
            exit 1
          fi
          echo "SUPABASE_PROJECT_ID length: ${#SUPABASE_PROJECT_ID}"

      - name: Deploy Changed Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          CHANGED_SHARED: ${{ steps.filter.outputs._shared }}
          CHANGED_INGEST_MACRO_EVENTS: ${{ steps.filter.outputs['ingest-macro-events'] }}
          CHANGED_INGEST_COMMODITY_RESERVES: ${{ steps.filter.outputs['ingest-commodity-reserves'] }}
          CHANGED_INGEST_MOSPI: ${{ steps.filter.outputs['ingest-mospi'] }}

          CHANGED_INGEST_NYFED_MARKETS: ${{ steps.filter.outputs['ingest-nyfed-markets'] }}
          CHANGED_INGEST_UN_COMTRADE: ${{ steps.filter.outputs['ingest-un-comtrade'] }}
          CHANGED_INGEST_SHADOW_TRADE: ${{ steps.filter.outputs['ingest-shadow-trade'] }}
          CHANGED_INGEST_TRADE_GRAVITY: ${{ steps.filter.outputs['ingest-trade-gravity'] }}
          CHANGED_CHECK_DATA_HEALTH: ${{ steps.filter.outputs['check-data-health'] }}
          CHANGED_GENERATE_WEEKLY_REGIME_DIGEST: ${{ steps.filter.outputs['generate-weekly-regime-digest'] }}
          CHANGED_GENERATE_MONTHLY_REGIME_DIGEST: ${{ steps.filter.outputs['generate-monthly-regime-digest'] }}

          CHANGED_COMPUTE_CIE_MACRO_SCORES: ${{ steps.filter.outputs['compute-cie-macro-scores'] }}
          CHANGED_INGEST_CIE_SHORT_SELLING: ${{ steps.filter.outputs['ingest-cie-short-selling'] }}
          CHANGED_INGEST_CIE_IPOS: ${{ steps.filter.outputs['ingest-cie-ipos'] }}
          CHANGED_INGEST_RBI_MONEY_MARKET: ${{ steps.filter.outputs['ingest-rbi-money-market'] }}
          CHANGED_INGEST_GLOBAL_REFINING: ${{ steps.filter.outputs['ingest-global-refining'] }}
          CHANGED_INGEST_GOLD_DEBT_COVERAGE: ${{ steps.filter.outputs['ingest-gold-debt-coverage'] }}
          CHANGED_INGEST_RBI_FX_DEFENSE: ${{ steps.filter.outputs['ingest-rbi-fx-defense'] }}
          CHANGED_INGEST_COMMODITY_TERMINAL: ${{ steps.filter.outputs['ingest-commodity-terminal'] }}
          CHANGED_INGEST_CIE_DEALS: ${{ steps.filter.outputs['ingest-cie-deals'] }}
          CHANGED_INGEST_CIE_PROMOTERS: ${{ steps.filter.outputs['ingest-cie-promoters'] }}

          CHANGED_INGEST_US_EDGAR_FUNDAMENTALS: ${{ steps.filter.outputs['ingest-us-edgar-fundamentals'] }}
          CHANGED_INGEST_FUEL_SECURITY_INDIA: ${{ steps.filter.outputs['ingest-fuel-security-india'] }}
          CHANGED_INGEST_COUNTRY_METRICS: ${{ steps.filter.outputs['ingest-country-metrics'] }}

          CHANGED_INGEST_US_MACRO: ${{ steps.filter.outputs['ingest-us-macro'] }}
          CHANGED_INGEST_INDIA_MACRO_SNAPSHOT: ${{ steps.filter.outputs['ingest-india-macro-snapshot'] }}

          CHANGED_LLM_KNOWLEDGE: ${{ steps.filter.outputs['llm-knowledge'] }}
        run: |
          deploy_func() {
            local func_name="$1"
            echo "Deploying $func_name..."
            supabase functions deploy "$func_name" --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt --debug
          }

          # If _shared changed, redeploy all functions
          if [ "$CHANGED_SHARED" = "true" ]; then
            echo "Shared utils changed — deploying all functions..."
            for func_dir in supabase/functions/*/; do
              if [ -f "${func_dir}index.ts" ]; then
                func_name=$(basename "$func_dir")
                deploy_func "$func_name"
              fi
            done
          else
            # Deploy only changed functions using named env vars
            [ "$CHANGED_INGEST_MACRO_EVENTS" = "true" ]        && deploy_func "ingest-macro-events"
            [ "$CHANGED_INGEST_COMMODITY_RESERVES" = "true" ]  && deploy_func "ingest-commodity-reserves"
            [ "$CHANGED_INGEST_MOSPI" = "true" ]               && deploy_func "ingest-mospi"

            [ "$CHANGED_INGEST_NYFED_MARKETS" = "true" ]       && deploy_func "ingest-nyfed-markets"
            [ "$CHANGED_INGEST_UN_COMTRADE" = "true" ]         && deploy_func "ingest-un-comtrade"
            [ "$CHANGED_INGEST_SHADOW_TRADE" = "true" ]        && deploy_func "ingest-shadow-trade"
            [ "$CHANGED_INGEST_TRADE_GRAVITY" = "true" ]       && deploy_func "ingest-trade-gravity"
            [ "$CHANGED_CHECK_DATA_HEALTH" = "true" ]          && deploy_func "check-data-health"
            [ "$CHANGED_GENERATE_WEEKLY_REGIME_DIGEST" = "true" ] && deploy_func "generate-weekly-regime-digest"
            [ "$CHANGED_GENERATE_MONTHLY_REGIME_DIGEST" = "true" ] && deploy_func "generate-monthly-regime-digest"

            [ "$CHANGED_COMPUTE_CIE_MACRO_SCORES" = "true" ]   && deploy_func "compute-cie-macro-scores"
            [ "$CHANGED_INGEST_CIE_SHORT_SELLING" = "true" ]   && deploy_func "ingest-cie-short-selling"
            [ "$CHANGED_INGEST_CIE_IPOS" = "true" ]            && deploy_func "ingest-cie-ipos"
            [ "$CHANGED_INGEST_RBI_MONEY_MARKET" = "true" ]    && deploy_func "ingest-rbi-money-market"
            [ "$CHANGED_INGEST_GLOBAL_REFINING" = "true" ]     && deploy_func "ingest-global-refining"
            [ "$CHANGED_INGEST_GOLD_DEBT_COVERAGE" = "true" ]  && deploy_func "ingest-gold-debt-coverage"
            [ "$CHANGED_INGEST_RBI_FX_DEFENSE" = "true" ]      && deploy_func "ingest-rbi-fx-defense"
            [ "$CHANGED_INGEST_COMMODITY_TERMINAL" = "true" ]  && deploy_func "ingest-commodity-terminal"
            [ "$CHANGED_INGEST_CIE_DEALS" = "true" ]           && deploy_func "ingest-cie-deals"
            [ "$CHANGED_INGEST_CIE_PROMOTERS" = "true" ]       && deploy_func "ingest-cie-promoters"

            [ "$CHANGED_INGEST_US_EDGAR_FUNDAMENTALS" = "true" ] && deploy_func "ingest-us-edgar-fundamentals"

            [ "$CHANGED_INGEST_COUNTRY_METRICS" = "true" ]     && deploy_func "ingest-country-metrics"
            [ "$CHANGED_INGEST_FUEL_SECURITY_INDIA" = "true" ] && deploy_func "ingest-fuel-security-india"
            [ "$CHANGED_INGEST_US_MACRO" = "true" ]            && deploy_func "ingest-us-macro"

            [ "$CHANGED_LLM_KNOWLEDGE" = "true" ]              && deploy_func "llm-knowledge"
            [ "$CHANGED_INGEST_INDIA_MACRO_SNAPSHOT" = "true" ] && deploy_func "ingest-india-macro-snapshot"
            echo "Selective deployment complete."
          fi
