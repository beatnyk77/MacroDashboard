[build]
  # Puppeteer's postinstall Chrome download doesn't survive Netlify's ephemeral
  # build cache, so we explicitly install Chrome before the build runs.
  command = "npx puppeteer browsers install chrome && npm run build"
  publish = "dist"

# Deploy previews skip the Puppeteer prerender step for faster builds.
# Previews still get a fully functional Vite SPA — prerendering only
# matters for SEO on the production site.
[context.deploy-preview]
  command = "tsc && vite build"

# Trailing-slash enforcement: client-side via TrailingSlashRedirect + prerender canonicals.
# Netlify TOML does not support multi-path conditions in one redirect block.
# Explicit SEO 301s (also in public/_redirects) — keep both in sync.

[[redirects]]
  from = "/thematics"
  to = "/labs/"
  status = 301
  force = true

[[redirects]]
  from = "/thematics/"
  to = "/labs/"
  status = 301
  force = true

[[redirects]]
  from = "/labs/india"
  to = "/intel/india/"
  status = 301
  force = true

[[redirects]]
  from = "/labs/india/"
  to = "/intel/india/"
  status = 301
  force = true

[[redirects]]
  from = "/labs/china"
  to = "/intel/china/"
  status = 301
  force = true

[[redirects]]
  from = "/labs/china/"
  to = "/intel/china/"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Frame policy: X-Frame-Options and CSP frame-ancestors are intentionally ABSENT.
# The embeddable-widget program (/tools/* with ?embed=true) requires third-party
# sites to iframe us, and Netlify header rules cannot loosen per-path — multiple
# matching CSP rules intersect (most restrictive wins), so the directives must
# stay out of this catch-all. Accepted clickjacking tradeoff: the site has no
# auth, no user sessions, and no state-changing forms, so framing carries no
# credential/action risk. Revisit if auth is ever added (use a Netlify Edge
# Function to inject frame-ancestors 'none' on non-/tools paths).
[[headers]]
  for = "/*"
  [headers.values]
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.supabase.co https://*.basemaps.cartocdn.com https://cdn.jsdelivr.net https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://*.analytics.google.com https://www.google.com https://*.clarity.ms https://cdn.jsdelivr.net https://static.cloudflareinsights.com; frame-src 'none';"
