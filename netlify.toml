[build]
  # Puppeteer's postinstall Chrome download doesn't survive Netlify's ephemeral
  # build cache, so we explicitly install Chrome before the build runs.
  command = "npx puppeteer browsers install chrome && npm run build"
  publish = "dist"

# Deploy previews skip the Puppeteer prerender step for faster builds.
# Previews still get a fully functional Vite SPA — prerendering only
# matters for SEO on the production site.
[context.deploy-preview]
  command = "tsc && vite build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://graphiquestor.com https://*.basemaps.cartocdn.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://*.clarity.ms https://cdn.jsdelivr.net; frame-src 'none';"
